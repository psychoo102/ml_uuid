name: CMake Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: win32-release
            artifact_name: "ml_uuid-win32"
            extension: ".dll"

          - os: ubuntu-latest
            preset: linux-x64-release
            artifact_name: "ml_uuid-linux-x64"
            extension: ".so"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Linux deps
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential liblua5.1-0-dev

      # Windows deps
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja

      # vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      # Configure via preset
      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      # Build via preset
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.preset }}
          path: |
            build/**/ml_uuid${{ matrix.extension }}
          if-no-files-found: warn

      # Upload to Release
      - name: Upload to Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/**/ml_uuid${{ matrix.extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}